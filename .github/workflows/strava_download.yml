name: Daily Strava Download

on:
  schedule:
    # Runs daily at 02:30 UTC — 30 min after coaching brief
    # Gives Garmin → Strava sync time to complete first
    - cron: '30 2 * * *'
  
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-activities:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Download new Strava activities
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: python claude/strava_download.py
      
      - name: Commit and push if new activities
        run: |
          git config user.name "Strava Sync Bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/activities/
          git diff --staged --quiet || git commit -m "Strava sync: $(date -u +%Y-%m-%d)"
          git push